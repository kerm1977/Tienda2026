{% extends 'base.html' %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4" style="background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="dynamic-nav rounded-circle d-inline-flex p-3 mb-3 shadow-sm">
                            <i class="bi bi-shield-lock-fill fs-2" style="color: var(--text-on-accent);"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Iniciar Sesión</h3>
                    </div>
                    
                    <form id="formLogin">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-medium">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control form-control-lg bg-light" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-muted fw-medium">Contraseña</label>
                            <div class="input-group">
                                <input type="password" id="password" class="form-control form-control-lg bg-light" required>
                                <button class="btn btn-light border toggle-password" type="button" data-target="password">
                                    <i class="bi bi-eye text-muted"></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn dynamic-btn btn-lg w-100 mb-4 fw-bold shadow-sm rounded-pill">
                            Entrar
                        </button>

                        <div class="text-center d-flex flex-column gap-3">
                            <a href="#" class="text-decoration-none dynamic-text fw-medium" data-bs-toggle="modal" data-bs-target="#modalLlave">
                                <i class="bi bi-key-fill"></i> ¿Olvidaste tu contraseña? (Usar Llave)
                            </a>
                            <hr class="text-muted opacity-25">
                            <span class="text-muted">¿No tienes cuenta? <a href="{{ url_for('tienda.registro') }}" class="text-decoration-none fw-bold dynamic-text">Regístrate aquí</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalLlave" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="background: rgba(255,255,255,0.95);">
            <div class="modal-header dynamic-nav border-bottom-0">
                <h5 class="modal-title fw-bold" style="color: var(--text-on-accent);"><i class="bi bi-key-fill me-2"></i> Acceso con Llave</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4">
                <p class="text-muted mb-4">Arrastra aquí el archivo <strong>.json</strong> que descargaste al crear tu cuenta.</p>
                
                <div id="dropZoneLlave" class="p-5 border border-2 rounded-4 bg-light text-center" style="border-style: dashed !important; border-color: var(--accent-strong) !important; cursor: pointer;">
                    <i class="bi bi-cloud-arrow-up-fill dynamic-text" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 fw-bold text-dark">Soltar Llave Aquí</h5>
                    <p class="mb-0 text-muted small">Haz clic para examinar</p>
                    <input type="file" id="fileInputLlave" accept=".json" class="d-none">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
