<!-- Nombre del archivo: templates/registro.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container py-5 mt-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4" style="background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="dynamic-nav rounded-circle d-inline-flex p-3 mb-3 shadow-sm">
                            <i class="bi bi-person-plus-fill fs-2" style="color: var(--text-on-accent);"></i>
                        </div>
                        <h3 class="fw-bold mt-2 text-dark">Crear Nueva Cuenta</h3>
                        <p class="text-muted">Completa tus datos de forma segura para obtener acceso.</p>
                    </div>
                    
                    <form id="formRegistro">
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label text-muted fw-medium small">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control form-control-lg bg-light fs-6" placeholder="Ej: Juan Pablo" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted fw-medium small">Primer Apellido</label>
                                <input type="text" id="primer_apellido" name="primer_apellido" class="form-control form-control-lg bg-light fs-6" placeholder="Ej: Perez" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted fw-medium small">Segundo Apellido</label>
                                <input type="text" id="segundo_apellido" name="segundo_apellido" class="form-control form-control-lg bg-light fs-6" placeholder="Ej: Soto" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-medium small">Teléfono (8 dígitos)</label>
                                <input type="text" id="telefono" name="telefono" class="form-control form-control-lg bg-light fs-6" maxlength="8" placeholder="88888888" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-medium small">Correo Electrónico</label>
                                <input type="email" id="email" name="email" class="form-control form-control-lg bg-light fs-6" placeholder="correo@ejemplo.com" required>
                            </div>
                        </div>

                        <div class="p-4 mb-4 bg-white rounded-4 border shadow-sm">
                            <label class="form-label fw-bold text-dark mb-3"><i class="bi bi-info-circle-fill me-1 dynamic-text"></i> Información de Perfil (Opcional)</label>
                            <select id="tipo_opcion_extra" class="form-select form-select-lg fs-6 bg-light mb-3">
                                <option value="">Selecciona un tipo de perfil...</option>
                                <option value="Empresa">Empresa</option>
                                <option value="Proveedor">Proveedor</option>
                                <option value="Institucion">Institución</option>
                                <option value="Otro">Otro</option>
                            </select>
                            <div id="dynamic-fields-container"></div>
                        </div>

                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-medium small">Contraseña</label>
                                <div class="input-group input-group-lg">
                                    <input type="password" id="password" name="password" class="form-control bg-light fs-6" required>
                                    <button class="btn btn-light border toggle-password" type="button" data-target="password"><i class="bi bi-eye"></i></button>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-medium small">Verificar Contraseña</label>
                                <div class="input-group input-group-lg">
                                    <input type="password" id="password_verify" class="form-control bg-light fs-6" required>
                                    <button class="btn btn-light border toggle-password" type="button" data-target="password_verify"><i class="bi bi-eye"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success btn-lg w-100 mb-4 shadow-sm fw-bold rounded-pill" style="background-color: #198754; border-color: #198754; transition: transform 0.2s;">
                                <i class="bi bi-shield-check me-2"></i> Completar Registro
                            </button>
                            <a href="{{ url_for('tienda.login') }}" class="text-decoration-none text-muted fw-medium">¿Ya tienes cuenta? <span class="dynamic-text fw-bold">Inicia sesión aquí</span></a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
