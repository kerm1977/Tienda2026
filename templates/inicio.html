<!-- Nombre del archivo: templates/inicio.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="p-5 mb-4 bg-white rounded-4 shadow-sm border border-light" style="background: rgba(255,255,255,0.7) !important; backdrop-filter: blur(5px);">
                <div class="container-fluid py-5">
                    <i class="bi bi-chat-dots-fill dynamic-text" style="font-size: 4.5rem;"></i>
                    <h1 class="display-5 fw-bold mt-3 text-dark">Bienvenido</h1>
                    <p class="col-md-10 mx-auto fs-5 text-muted mt-3 mb-4">
                        Comunícate de forma segura y rápida. Una plataforma diseñada para la eficiencia.
                    </p>
                    
                    {% if session.get('user_id') %}
                        <a href="{{ url_for('tienda.chat') }}" class="btn dynamic-btn btn-lg px-5 shadow-sm rounded-pill">
                            <i class="bi bi-chat-square-text me-2"></i> Ir al Chat
                        </a>
                    {% else %}
                        <a href="{{ url_for('tienda.login') }}" class="btn dynamic-btn btn-lg px-4 me-md-2 shadow-sm rounded-pill">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                        </a>
                        <a href="{{ url_for('tienda.registro') }}" class="btn bg-white dynamic-text btn-lg px-4 shadow-sm rounded-pill mt-3 mt-md-0">
                            Registrarse
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
