<!-- Nombre del archivo: templates/tienda.html -->
{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="glass-panel p-4 d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Nuestros Productos</h2>
            <div class="input-group" style="width: 250px;">
                <input type="text" class="form-control glass-input" placeholder="Buscar...">
                <button class="btn glass-btn"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="row g-4">
    <!-- Ejemplo de tarjeta de producto (Repetir según necesites) -->
    <div class="col-md-4">
        <div class="glass-panel p-3 h-100 game-card">
            <div class="bg-dark rounded mb-3 d-flex align-items-center justify-content-center" style="height: 150px;">
                <i class="bi bi-box-seam fs-1 text-secondary"></i>
            </div>
            <h5>Producto de Ejemplo</h5>
            <p class="text-white-50">Descripción breve del artículo.</p>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fs-5 fw-bold text-info">$29.99</span>
                <button class="btn glass-btn-success btn-sm"><i class="bi bi-cart-plus"></i> Comprar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
